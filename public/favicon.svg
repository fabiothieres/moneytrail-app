<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Back note -->
  <rect x="10" y="6" width="44" height="26" rx="4" fill="#86efac" stroke="#166534" stroke-width="2.5"/>
  <!-- Middle note -->
  <rect x="6" y="14" width="44" height="26" rx="4" fill="#a7f3d0" stroke="#166534" stroke-width="2.5"/>
  <!-- Front note -->
  <rect x="2" y="22" width="44" height="26" rx="4" fill="#d1fae5" stroke="#166534" stroke-width="2.5"/>
  <!-- Dollar circles -->
  <circle cx="10" cy="35" r="3.5" fill="none" stroke="#166534" stroke-width="2"/>
  <circle cx="38" cy="35" r="3.5" fill="none" stroke="#166534" stroke-width="2"/>
  <!-- Dollar sign -->
  <text x="24" y="40" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="18" fill="#166534">$</text>
</svg>